<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="/js/config/supabase.js"></script>

  <title>Usuarios</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/usuarios.css">

</head>

<body>



<!-- TOPO -->
<div class="topbar">

 

  <button id="menuBtn" class="menu-btn">
    ☰
  </button>

  <div class="topbar-title">
    Usuarios
  </div>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

  <div class="sidebar-header">
    Menu
  </div>

  <a href="/dashboard/lapa1">
    🏠 Dashboard
  </a>

  <a href="/mapa">
    📍 Mapa
  </a>

  <a href="/historico">
    📜 Histórico
  </a>

  <a href="/configuracoes">
    ⚙️ Configurações
  </a>

  <a href="/usuarios">
    👤 Usuários
  </a>

  <a href="#" onclick="logout()">
    🚪 Sair
  </a>

</div>

<div id="overlay" class="overlay"></div>

<!-- CONTEÚDO -->
<div class="page-content">


  <div id="usuariosContent" class="manual-content">

    <!-- TOPO -->
    <div class="ruas-header">

      <h3>
        Lista de Usuários
      </h3>

      <button 
        class="btn-nova-rua"
        onclick="abrirModalUsuario()"
      >
        + Novo Usuário
      </button>

    </div>

    <!-- TABELA -->
    <div class="table-wrap">

      <table class="ruas-table">

        <thead>

          <tr>

            <th>ID</th>

            <th>Nome</th>

            <th>Email</th>

            <th>Perfil</th>

            <th>Conjunto</th>

            <th>Status</th>

            <th>Data de Criação</th>

            <th id="thEditar" style="display: none;">Editar</th>

            <th id="thExcluir" style="display: none;">Excluir</th>

          </tr>

        </thead>

        <tbody id="tbodyUsuarios">

        </tbody>

      </table>

    </div>

  </div>

</div>


<!-- ========================= -->
<!-- MODAL RUA -->
<!-- ========================= -->

<div id="modalUsuario" class="modal-rua">

   <div class="modal-rua-content">

      <div class="modal-header">

         <h2 id="tituloModalUsuario">
            Novo Usuário
         </h2>

         <button
            class="btn-close"
            onclick="fecharModalUsuario()"
         >
            ✖
         </button>

      </div>

      <div class="form-group">

         <label>Nome</label>

         <input
            type="text"
            id="inputNomeUsuario"
         >

      </div>

      <div class="form-group">

         <label>E-mail</label>

         <input
            type="email"
            id="inputEmailUsuario"
         >

      </div>

      <div class="form-group">

         <label>Senha</label>

         <input
            type="password"
            id="inputSenhaUsuario"
         >

      </div>

      <div class="form-group">

         <label>Perfil</label>

         <select
            id="inputPerfilUsuario"
         >

            <option value="ADMIN">
               Administrador
            </option>

            <option value="TECNICO">
               Técnico
            </option>

            <option value="OPERADOR">
               Operador
            </option>

            <option value="CLIENTE">
               Cliente
            </option>

         </select>

      </div>

      <div class="form-group">

         <label>Conjunto</label>

         <input
            type="text"
            id="inputConjuntoUsuario"
         >

      </div>

      <div class="form-group">

         <label>Status</label>

         <select
            id="inputStatusUsuario"
         >

            <option value="ATIVO">
               Ativo
            </option>

            <option value="INATIVO">
               Inativo
            </option>

         </select>

      </div>

      <button
         class="btn-salvar-rua"
         onclick="salvarUsuario()"
      >
         Salvar Usuário
      </button>

   </div>

</div>

</div>

<script src="/js/menu.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/usuarios.js"></script>

</body>
</html>
