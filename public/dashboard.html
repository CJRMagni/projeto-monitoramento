<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

  <button id="btnAtivarSom" style="
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 10px;
    background: #28a745;

    border: none;

<!--  <button id="btnGravar" class="gravar-btn">🔴 Gravar Tela</button>
  <button id="btnParar" class="parar-btn" style="display:none;">⏹ Parar</button> -->

<!-- GRID PRINCIPAL -->
<div class="app-container">

  <!-- COLUNA DOS CARDS (ESQUERDA) -->
  <div class="cards-column" id="cardsColumn">
    

  </div>

  <!-- COLUNA DO VÍDEO (DIREITA) -->
  <div class="video-column">
    <div class="video-preview" style="display:none;" id="previewWrap">
      <div id="jaas-container"></div>
    </div>
  </div>

</div>

<!-- MODAL FORMULÁRIO -->
<div id="modalAtendimento" class="modal-atendimento">

  <div class="modal-content">

    <div class="modal-header">

      <h2>Registro de Atendimento</h2>

      <button 
        class="btn-close"
        onclick="fecharModalAtendimento()"
      >
        ✖
      </button>

    </div>

    <div class="form-group">

      <label>Status do Atendimento</label>

      <select id="statusAtendimento">

        <option value="">Selecione</option>

        <option value="RESOLVIDO">
          Resolvido
        </option>

        <option value="NAO_RESOLVIDO">
          Não Resolvido
        </option>

        <option value="TROTE">
          Trote
        </option>

        <option value="ENCAMINHADO">
          Encaminhado
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Prioridade</label>

      <select id="prioridadeAtendimento">

        <option value="BAIXA">Baixa</option>
        <option value="MEDIA">Média</option>
        <option value="ALTA">Alta</option>
        <option value="CRITICA">Crítica</option>

      </select>

    </div>

    <div class="form-group">

      <label>Necessitou suporte externo?</label>

      <select id="suporteExterno">

        <option value="NAO">Não</option>
        <option value="SIM">Sim</option>

      </select>

    </div>

    <div class="form-group">

      <label>Observações</label>

      <textarea 
        id="observacoesAtendimento"
        rows="5"
        placeholder="Digite observações do atendimento..."
      ></textarea>

    </div>

    <button 
      class="btn-salvar-atendimento"
      onclick="salvarAtendimento()"
    >
      Salvar Atendimento
    </button>

  </div>

</div>

  <script src="/js/dashboard.js"></script>

  <script>

  if ('serviceWorker' in navigator) {

    navigator.serviceWorker
    .register('/sw.js')

    .then((reg) => {

        console.log("SW registrado", reg);

    })

    .catch((err) => {

        console.log("Erro SW", err);

    });

  }

  </script>

</body>
</html>
