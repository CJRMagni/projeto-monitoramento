<!DOCTYPE html>
<html lang="pt-br">
<head>

   <meta charset="UTF-8">

   <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
   >

   <title>Cadastro</title>

   <link
      rel="stylesheet"
      href="/css/login.css"
   >

</head>
<body>

<div class="login-container">

   <div class="login-card">

      <div class="logo-area">

         <h1>
            Kallimage Comércio de Equipamentos
         </h1>

         <p>
            Criar Conta
         </p>

      </div>

      <form id="formCadastro">

         <div class="input-group">

            <label>
               Nome Completo
            </label>

            <input
               type="text"
               id="nome"
               placeholder="Digite seu nome"
               required
            >

         </div>

         <div class="input-group">

            <label>
               E-mail
            </label>

            <input
               type="email"
               id="email"
               placeholder="Digite seu e-mail"
               required
            >

         </div>

         <div class="input-group">

            <label>
               Senha
            </label>

            <input
               type="password"
               id="senha"
               placeholder="Digite sua senha"
               required
            >

         </div>

         <div class="input-group">

            <label>
               Confirmar Senha
            </label>

            <input
               type="password"
               id="confirmarSenha"
               placeholder="Repita sua senha"
               required
            >

         </div>

         <button
            type="submit"
            class="btn-login"
         >
            Criar Conta
         </button>

      </form>

      <div class="cadastro-link">

         Já possui cadastro?

         <a href="/login">
            Entrar
         </a>

      </div>

   </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/config/supabase.js"></script>

<script src="/js/cadastro.js"></script>

</body>
</html>
