<!doctype html>
<html lang="pt-BR">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="/js/config/supabase.js"></script>

  <script src='https://8x8.vc/vpaas-magic-cookie-99e1f2c24e7b4ec9a7a157ab0126c6b8/external_api.js' async></script>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atendimento — Vídeo / Telefone / WhatsApp</title>

  <link rel="stylesheet" href="/css/painel-clientes.css">

</head>
<body>
  <div class="wrap">
    <main class="card">
      <header>
        <div style="width:160px;height:48px;border-radius:12px;background:linear-gradient(180deg,var(--accent),#0953d6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">Kallimage</div>
        <div>
          <h1>Como deseja ser atendido?</h1>
          <p class="lead">Escolha uma opção.</p>
        </div>
      </header>

      <div id="statusAtendente" 
          style="
            padding:12px; 
            border-radius:12px;
            margin:12px 0;
            text-align:center;
            font-weight:600;
            background:#adb5bd; 
            color:white;
          ">
        Verificando disponibilidade...
      </div>

      <section class="buttons" style="margin-top:18px">
        <button id="btnVideo" class="btn" aria-label="Chamada por vídeo">
          <div class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 10.5V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3.5l4 4V6.5l-4 4z" fill="currentColor"/></svg>
          </div>
          <div class="label">
            <div style="font-weight:600">Chamada por vídeo</div>
            <div class="hint">Preview da sua câmera + abre sala</div>
          </div>
        </button>

        <button id="btnPhone" class="btn" aria-label="Chamada telefônica">
          <div class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.88 19.88 0 0 1 11.19 18a19.5 19.5 0 0 1-6-6A19.88 19.88 0 0 1 2.08 4.18 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.72c.12 1.1.38 2.18.77 3.2a2 2 0 0 1-.45 2.11L8.91 10.91a16 16 0 0 0 6 6l1.88-1.88a2 2 0 0 1 2.11-.45c1.02.39 2.09.65 3.2.77A2 2 0 0 1 22 16.92z" fill="currentColor"/></svg>
          </div>
          <div class="label">
            <div style="font-weight:600">Ligar por telefone</div>
            <div class="hint">Discar automático e enviar ramal</div>
          </div>
        </button>

        <button id="btnWhats" class="btn" aria-label="Chamar pelo WhatsApp">
          <div class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.5 3.5A11.9 11.9 0 0 0 12 1C6 1 1.5 5.5 1.5 11.5c0 2 .6 3.9 1.7 5.5L1 23l6-1.6a10.9 10.9 0 0 0 5 1.1c6 0 10.5-4.5 10.5-10.5 0-3-1.2-5.8-3.5-7.5z" fill="currentColor"/></svg>
          </div>
          <div class="label">
            <div style="font-weight:600">Chamar pelo WhatsApp</div>
            <div class="hint">Abre conversa com mensagem pronta</div>
          </div>
        </button>
      </section>

      <div class="video-preview" id="previewWrap">
      <!--  <video id="localVideo" autoplay muted playsinline></video> -->
        <div id="jaas-container" />
      </div>

      <footer>
        <div class="small">Dica: se o 0800 não aceitar DTMF ou tiver atendimento automático, o envio do ramal pode não funcionar.</div>
      </footer>
    </main>
  </div>

   <script src="/js/painel-cliente.js"></script>


</body>
</html>
