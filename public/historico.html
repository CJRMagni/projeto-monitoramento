<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="display-capture=(self)">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="/js/config/supabase.js"></script>

  <title>Historico</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/historico.css">

</head>

<body>

<!-- TOPO -->
<div class="topbar">

  <button id="menuBtn" class="menu-btn">
    ☰
  </button>

  <div class="topbar-title">
    Histórico de Alertas
  </div>

</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

  <div class="sidebar-header">
    Menu
  </div>

  <a href="/dashboard/lapa1">
    🏠 Dashboard
  </a>

  <a href="/mapa">
    📍 Mapa
  </a>

  <a href="/historico">
    📜 Histórico
  </a>

  <a href="/configuracoes">
    ⚙️ Configurações
  </a>

  <a href="/usuarios">
    👤 Usuários
  </a>

  <a href="#" onclick="logout()">
    🚪 Sair
  </a>

</div>

<div id="overlay" class="overlay"></div>

  <!-- CONTEÚDO -->
  <div class="page-content">

    <div class="manual-card">

      <button 
        class="manual-btn"
        onclick="toggleHistorico()"
      >
        Histórico de Alertas
        <span id="ruasIconAlertas">▼</span>
      </button>

        <div id="hstoricoContent" class="manual-content">

          <div class="history-card">

            <div class="history-header">

              <h2>Histórico de Alertas</h2>

              <input 
                type="text" 
                id="filtroBusca"
                placeholder="Buscar rua..."
              >

            </div>

            <div class="table-wrap">

              <table class="history-table">

                <thead>

                  <tr>
                    <th></th> 
                    <th>ID</th>
                    <th>Data</th>
                    <th>Atendente</th>
                    <th>Anotações</th>
                    <th>Rua</th>
                    <th>Serviço</th>
                    <th>Dispositivo</th>
                    <th>Conexão</th>
                    <th></th>
                  </tr>

                </thead>

                <tbody id="tbodyHistorico">

                </tbody>

              </table>

            </div>

          </div>

        </div>

    </div>



    <div class="manual-card">

      <button 
        class="manual-btn"
        onclick="toggleMensagens()"
      >
        Histórico de Mensagens
        <span id="ruasIconMensagens">▼</span>
      </button>

        <div id="mensagensContent" class="manual-content">

          <div class="history-card">

            <div class="history-header">

              <h2>Histórico de Mensagens</h2>

              <input 
                type="text" 
                id="filtroBusca"
                placeholder="Buscar rua..."
              >

            </div>

            <div class="table-wrap">

              <table class="history-table">

                <thead>

                  <tr>
                    <th></th> 
                    <th>ID</th>
                    <th>Data</th>
                    <th>Rua</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Assunto</th>
                    <th>Mensagem</th>
                    <th>Status</th>
                    <th></th>
                  </tr>

                </thead>

                <tbody id="tbodyMensagens">

                </tbody>

              </table>

            </div>

          </div>

        </div>

    </div>

  </div>


</div>

<!-- MODAL FORMULÁRIO -->
<div id="modalAtendimento" class="modal-atendimento">

  <div class="modal-content">

    <div class="modal-header">

      <h2 id="texto-registro">Registro de Atendimento</h2>

      <button 
        class="btn-close"
        onclick="fecharModalAtendimento()"
      >
        ✖
      </button>

    </div>

    <div class="form-group">

      <label>Status do Atendimento</label>

      <select id="statusAtendimento">

        <option value="">Selecione</option>

        <option value="RESOLVIDO">
          Resolvido
        </option>

        <option value="NAO_RESOLVIDO">
          Não Resolvido
        </option>

        <option value="TROTE">
          Trote
        </option>

        <option value="ENCAMINHADO">
          Encaminhado
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Prioridade</label>

      <select id="prioridadeAtendimento">

        <option value="BAIXA">Baixa</option>
        <option value="MEDIA">Média</option>
        <option value="ALTA">Alta</option>
        <option value="CRITICA">Crítica</option>

      </select>

    </div>

    <div class="form-group">

      <label>Necessitou suporte externo?</label>

      <select id="suporteExterno">

        <option value="NAO">Não</option>
        <option value="SIM">Sim</option>

      </select>

    </div>

    <div class="form-group">

      <label>Observações</label>

      <textarea 
        id="observacoesAtendimento"
        rows="5"
        placeholder="Digite observações do atendimento..."
      ></textarea>

    </div>

    <button 
      class="btn-salvar-atendimento"
      onclick="salvarAtendimento()"
    >
      Salvar Atendimento
    </button>

  </div>

</div>


<dialog id="modalAnexos">

    <div class="modal-header">

        <h3>Anexos</h3>

        <button onclick="modalAnexos.close()">
            ✖
        </button>

    </div>

    <div id="containerAnexos"></div>

</dialog>

<script src="/js/menu.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/historico.js"></script>

</body>
</html>
