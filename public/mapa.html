<!-- GRID PRINCIPAL -->
<div class="map-container">

   <div id="map"></div>

</div>



<!-- ========================= -->
<!-- POPUPS ALERTAS -->
<!-- ========================= -->

<div id="alertsContainer"
     class="alerts-container">

</div>

 <!-- COLUNA DO VÍDEO (DIREITA) -->
<!-- JANELA FLUTUANTE -->
<div class="video-window" id="videoWindow">

  <div class="video-header" id="videoHeader">

    <span>📹 Atendimento em Vídeo</span>

    <div class="video-actions">

      <button onclick="minimizarVideo()">➖</button>

      <button onclick="fecharVideo()">✖</button>

    </div>

  </div>

  <div id="previewWrap" class="video-body">

    <div id="jaas-container"></div>

  </div>

</div>

<!-- MODAL FORMULÁRIO -->
<div id="modalAtendimento" class="modal-atendimento">

  <div class="modal-content">

    <div class="modal-header">

      <h2 id="texto-registro">Registro de Atendimento</h2>

      <button 
        class="btn-close"
        onclick="fecharModalAtendimento()"
      >
        ✖
      </button>

    </div>

    <div class="form-group">

      <label>Status do Atendimento</label>

      <select id="statusAtendimento">

        <option value="">Selecione</option>

        <option value="RESOLVIDO">
          Resolvido
        </option>

        <option value="NAO_RESOLVIDO">
          Não Resolvido
        </option>

        <option value="TROTE">
          Trote
        </option>

        <option value="ENCAMINHADO">
          Encaminhado
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Prioridade</label>

      <select id="prioridadeAtendimento">

        <option value="BAIXA">Baixa</option>
        <option value="MEDIA">Média</option>
        <option value="ALTA">Alta</option>
        <option value="CRITICA">Crítica</option>

      </select>

    </div>

    <div class="form-group">

      <label>Necessitou suporte externo?</label>

      <select id="suporteExterno">

        <option value="NAO">Não</option>
        <option value="SIM">Sim</option>

      </select>

    </div>

    <div class="form-group">

      <label>Observações</label>

      <textarea 
        id="observacoesAtendimento"
        rows="5"
        placeholder="Digite observações do atendimento..."
      ></textarea>

    </div>

    <button 
      class="btn-salvar-atendimento"
      onclick="salvarAtendimento()"
    >
      Salvar Atendimento
    </button>

  </div>

</div>


<!-- JANELA FLUTUANTE -->
<div id="cameraWindow" class="camera-window">

  <div id="cameraHeader" class="camera-header">

    <span>📹 Câmera Ao Vivo</span>

    <button onclick="fecharCamera()">
      ✖
    </button>

  </div>

  <div class="camera-body" id="cameraBody">

  </div>

</div>


  <script src="/js/mapa.js"></script>
